<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Price Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    height:100vh;

    background-image:url('https://images.unsplash.com/photo-1570129477492-45c003edd2be');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{

    width:550px;

    background:rgba(255,255,255,0.95);

    padding:35px;

    border-radius:20px;

    box-shadow:0px 8px 25px rgba(0,0,0,0.3);

    text-align:center;

    max-height:90vh;
    overflow-y:auto;
}

.house-img{
    width:120px;
    margin-bottom:15px;
}

h1{
    color:#2c3e50;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input,
select{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:15px;
}

label{

    display:block;

    text-align:left;

    margin-top:10px;

    color:#2c3e50;

    font-weight:bold;
}

button{

    width:100%;

    padding:14px;

    background:#27ae60;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    margin-top:15px;

    transition:0.3s;
}

button:hover{
    background:#1e8449;
}

.result{

    margin-top:20px;

    padding:15px;

    background:#e8f8f0;

    border-radius:10px;

    color:#145a32;

    font-size:20px;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<img
class="house-img"
src="https://cdn-icons-png.flaticon.com/512/619/619153.png"
alt="House">

<h1>🏠 House Price Predictor</h1>

<p>Enter your house details below</p>

<form action="/predict" method="post">

<input
type="number"
name="area"
placeholder="Area (sqft)"
required>

<input
type="number"
name="bedrooms"
placeholder="Bedrooms"
required>

<input
type="number"
name="bathrooms"
placeholder="Bathrooms"
required>

<input
type="number"
name="kitchen"
placeholder="Number of Kitchens"
required>

<label>📦 Store Room Available?</label>

<select name="storeroom" required>
<option value="">Select</option>
<option value="1">✅ Yes</option>
<option value="0">❌ No</option>
</select>

<label>🏛 Big Hall Available?</label>

<select name="bighall" required>
<option value="">Select</option>
<option value="1">✅ Yes</option>
<option value="0">❌ No</option>
</select>

<label>🚗 Parking Available?</label>

<select name="parking" required>
<option value="">Select</option>
<option value="1">✅ Yes</option>
<option value="0">❌ No</option>
</select>

<label>🌳 Garden Available?</label>

<select name="garden" required>
<option value="">Select</option>
<option value="1">✅ Yes</option>
<option value="0">❌ No</option>
</select>

<label>🏊 Swimming Pool Available?</label>

<select name="swimmingpool" required>
<option value="">Select</option>
<option value="1">✅ Yes</option>
<option value="0">❌ No</option>
</select>

<button type="submit">
💰 Predict House Price
</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
